# ddrs MERIT training config.
#
# Hyperparameters are pulled verbatim from
# ~/projects/ddr/config/merit_training_config.yaml.
# Forcing is daily; the loader interpolates to hourly (repeat × 24, trim to
# n_hourly) before feeding the Muskingum-Cunge engine — same pattern as
# DDR's StreamflowReader.

mode: training
workflow: train-and-test    # ddrs plan/run picks this up; override with --workflow X
geodataset: merit
device: 0                   # CUDA device ordinal (mirrors DDR's `device:` key)
seed: 42
np_seed: 42

# Source paths — read in place by ddrs's Rust loaders (zarrs + icechunk + netcdf).
# No export/materialization step; the harness reads DDR's live data sources
# straight from disk.
data_sources:
  attributes: /home/tbindas/projects/ddr/data/merit_global_attributes_v2.nc
  conus_adjacency: /home/tbindas/projects/ddr/data/merit_conus_adjacency.zarr
  gages_adjacency: /home/tbindas/projects/ddr/data/merit_gages_conus_adjacency.zarr
  streamflow: /mnt/ssd1/data/icechunk/merit_dhbv2_UH_retrospective.ic
  observations: /mnt/ssd1/data/icechunk/usgs_daily_observations
  gages: /home/tbindas/projects/ddr/references/gage_info/gages_3000.csv

experiment:
  batch_size: 64
  start_time: 1981/10/01
  end_time: 1995/09/30
  epochs: 5
  rho: 90
  shuffle: true
  warmup: 5
  learning_rate:
    1: 0.001
    3: 0.0005
  grad_clip_max_norm: 1.0

kan_head:
  hidden_size: 21
  num_hidden_layers: 2
  # B-spline grid intervals (`num` in pykan). Matches DDR's
  # ~/projects/ddr/config/merit_training_config.yaml::kan.grid.
  grid: 50
  # B-spline order. Matches DDR's ::kan.k. (pykan's KANLayer default is 3,
  # but DDR overrides to 2 for production.)
  k: 2
  input_var_names:
    - SoilGrids1km_clay
    - aridity
    - meanelevation
    - meanP
    - NDVI
    - meanslope
    - log10_uparea
    - SoilGrids1km_sand
    - ETPOT_Hargr
    - Porosity
  learnable_parameters:
    - n
    - q_spatial
    - p_spatial

# Routing-engine knobs — DDR's MERIT defaults (matches mock_config in tests).
params:
  parameter_ranges:
    n: [0.015, 0.25]
    q_spatial: [0.0, 1.0]
    p_spatial: [1.0, 200.0]
  attribute_minimums:
    discharge: 1.0e-4
    slope: 1.0e-3
    velocity: 0.01
    depth: 0.01
    bottom_width: 0.01
  defaults:
    p_spatial: 21.0
  log_space_parameters:
    - p_spatial
  sparse_solver: cuda    # opt-in for GPU cuSPARSE solve (requires CUDA backend)
  use_cuda_graphs: true  # SP-10: forward CUDA Graph capture+replay (CUDA backend only; V7a=0.385)

# Test-mode overlay. When the binary is run with --mode testing, these keys
# replace the corresponding ones in `experiment:`. Absent keys inherit.
#
# IMPORTANT: batch_size SEMANTIC SHIFTS between modes:
#   - experiment.batch_size (training) = number of GAUGES per mini-batch
#   - testing.batch_size              = number of DAYS per chunk
testing:
  start_time: 1995/10/01
  end_time: 2010/09/30
  batch_size: 15      # DAYS, not gauges
  rho: null           # disabled in test mode
